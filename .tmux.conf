##### Reload config #####
unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

##### Terminal / colors #####
set -g default-terminal "tmux-256color"
# keep your original approach; if your terminal is not xterm-256color, change this later
set -ag terminal-overrides ",xterm-256color:RGB"

##### Prefix (your choice) #####
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# If C-s ever freezes your terminal, run: stty -ixon

##### Basics #####
set -g mouse on
set-window-option -g mode-keys vi

##### Pane navigation (your binds) #####
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

##### Your “terminal-like pane” #####
bind - split-window -v -l 6 -c "#{pane_current_path}" 
bind-key _ kill-pane

##### Status layout (your original-ish UI choices) #####
set-option -g status-position top

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
##### Window naming: show last directory by default, keep manual names #####
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Catppuccin window text: show only the last directory (basename)
set -g @catppuccin_window_default_text '#{b:pane_current_path}'
set -g @catppuccin_window_current_text '#{b:pane_current_path}'
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_session}"

##### Plugins #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.0'

set -g @catppuccin_window_current_text "#{window_name}"
set -g @catppuccin_window_text "#{window_name}"

##### TPM must be last #####
run '~/.tmux/plugins/tpm/tpm'
set -g status-style bg=default
