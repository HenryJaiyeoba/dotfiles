
# ==================================================
# AeroSpace configuration
# Horizontal tiling only
# ==================================================

start-at-login = true

#Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 10
default-root-container-layout = "tiles"
default-root-container-orientation = "auto"

#for monitor focusing
on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]

# --------------------------------------------------
# Gaps (set to zero for true full-width windows)
# --------------------------------------------------
[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.right = 0
outer.top = 0
outer.bottom = 0

# --------------------------------------------------
# Keybindings
# --------------------------------------------------
[mode.main.binding]

# --- Workspace switching ---
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-a = 'workspace A'
    alt-b = 'workspace B'
    alt-c = 'workspace C'
    alt-d = 'workspace D'
    alt-e = 'workspace E'
    alt-f = 'workspace F'
    alt-g = 'workspace G'
    alt-i = 'workspace I'
    alt-m = 'workspace M'
    alt-n = 'workspace N'
    alt-o = 'workspace O'
    alt-p = 'workspace P'
    alt-q = 'workspace Q'
    alt-r = 'workspace R'
    alt-s = 'workspace S'
    alt-t = 'workspace T'
    alt-u = 'workspace U'
    alt-v = 'workspace V'
    alt-w = 'workspace W'
    alt-x = 'workspace X'
    alt-y = 'workspace Y'
    alt-z = 'workspace Z'

# --- Send window to workspace ---
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    alt-shift-a = 'move-node-to-workspace A'
    alt-shift-b = 'move-node-to-workspace B'
    alt-shift-c = 'move-node-to-workspace C'
    alt-shift-d = 'move-node-to-workspace D'
    alt-shift-e = 'move-node-to-workspace E'
    alt-shift-f = 'move-node-to-workspace F'
    alt-shift-g = 'move-node-to-workspace G'
    alt-shift-i = 'move-node-to-workspace I'
    alt-shift-m = 'move-node-to-workspace M'
    alt-shift-n = 'move-node-to-workspace N'
    alt-shift-o = 'move-node-to-workspace O'
    alt-shift-p = 'move-node-to-workspace P'
    alt-shift-q = 'move-node-to-workspace Q'
    alt-shift-r = 'move-node-to-workspace R'
    alt-shift-s = 'move-node-to-workspace S'
    alt-shift-t = 'move-node-to-workspace T'
    alt-shift-u = 'move-node-to-workspace U'
    alt-shift-v = 'move-node-to-workspace V'
    alt-shift-w = 'move-node-to-workspace W'
    alt-shift-x = 'move-node-to-workspace X'
    alt-shift-y = 'move-node-to-workspace Y'
    alt-shift-z = 'move-node-to-workspace Z'

# --- Focus (horizontal only) ---
alt-h = "focus left"
alt-l = "focus right"

# --- Move windows ---
alt-ctrl-h = "move left"
alt-ctrl-l = "move right"

# --- Resize width (horizontal tiling) ---
alt-equal = "resize smart +50"
alt-minus = "resize smart -50"


alt-tab = "workspace-back-and-forth"
alt-ctrl-tab = "move-workspace-to-monitor --wrap-around next"
# --- Layout (force horizontal tiling) ---
# alt-b = "layout tiles horizontal"

# --- Floating / fullscreen / close ---
alt-ctrl-space = "layout floating tiling"

alt-ctrl-semicolon = "mode service"

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
# --------------------------------------------------
# Auto-assign apps to workspaces
# --------------------------------------------------

[[on-window-detected]]
if.app-id = "com.mitchellh.ghostty"
run = ["move-node-to-workspace 1"]

[[on-window-detected]]
if.app-id = "company.thebrowser.Browser" # Arc
run = ["move-node-to-workspace A"]

[[on-window-detected]]
if.app-id = "com.mitchellh.ghostty" # ghostty
run = ["move-node-to-workspace 1"]

[[on-window-detected]]
if.app-id = "app.zen-browser.zen" # Zen Browser
run = ["move-node-to-workspace Z"]

[[on-window-detected]]
if.app-id = "com.utmapp.UTM" # UTM
run = ["move-node-to-workspace U"]

[[on-window-detected]]
if.app-id = "com.spotify.client" # Spotify
run = ["move-node-to-workspace S"]

[[on-window-detected]]
if.app-id = "com.whatsapp.WhatsApp" # WhatsApp
run = ["move-node-to-workspace W"]

[[on-window-detected]]
if.app-id = "com.hnc.Discord" # Discord
run = ["move-node-to-workspace D"]

[[on-window-detected]]
if.app-id = "com.apple.finder" # Finder
run = ["move-node-to-workspace F"]

[[on-window-detected]]
if.app-id = "com.openai.chat" # ChatGPT
run = ["move-node-to-workspace C"]

[[on-window-detected]]
if.app-id = "com.microsoft.VSCode" # VSCode
run = ["move-node-to-workspace 2"]

[[on-window-detected]]
if.app-id = "com.apple.Safari" # Safari
run = ["move-node-to-workspace 3"]

#handling monitors
[workspace-to-monitor-force-assignment]
    "2" = "main"
    "3" = "main"
    "4" = "main"
    "5" = "main"
    "C" = "main"
    "S" = "main"
    "D" = "main"
    "F" = "main"
    "Z" = "main"
    "W" = "main"
    "I" = "secondary"
    "U" = "secondary"
    "1" = "secondary"
    "A" = "secondary"
