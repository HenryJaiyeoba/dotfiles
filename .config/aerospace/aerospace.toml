# ==================================================
# AeroSpace configuration
# Horizontal tiling only
# ==================================================

start-at-login = true

# --------------------------------------------------
# Gaps (set to zero for true full-width windows)
# --------------------------------------------------
[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.right = 0
outer.top = 0
outer.bottom = 0

# --------------------------------------------------
# Keybindings
# --------------------------------------------------
[mode.main.binding]

# --- Workspace switching ---
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"

# --- Send window to workspace ---
alt-ctrl-1 = "move-node-to-workspace 1"
alt-ctrl-2 = "move-node-to-workspace 2"
alt-ctrl-3 = "move-node-to-workspace 3"
alt-ctrl-4 = "move-node-to-workspace 4"
alt-ctrl-5 = "move-node-to-workspace 5"
alt-ctrl-6 = "move-node-to-workspace 6"
alt-ctrl-7 = "move-node-to-workspace 7"

# --- Focus (horizontal only) ---
alt-h = "focus left"
alt-l = "focus right"

# --- Move windows ---
alt-ctrl-h = "move left"
alt-ctrl-l = "move right"

# --- Resize width (horizontal tiling) ---
alt-ctrl-equal = "resize smart +50"
alt-ctrl-minus = "resize smart -50"

# --- Layout (force horizontal tiling) ---
alt-b = "layout tiles horizontal"

# --- Floating / fullscreen / close ---
alt-ctrl-space = "layout floating tiling"
alt-f = "macos-native-fullscreen"
alt-q = "close"

# --------------------------------------------------
# Auto-assign apps to workspaces
# --------------------------------------------------

[[on-window-detected]]
if.app-id = "com.mitchellh.ghostty"
run = ["move-node-to-workspace 1"]
manage = false

[[on-window-detected]]
if.app-id = "com.google.Chrome"
run = ["move-node-to-workspace 2"]

[[on-window-detected]]
if.app-id = "company.thebrowser.Browser" # Arc
run = ["move-node-to-workspace 2"]

[[on-window-detected]]
if.app-id = "org.mozilla.firefox"
run = ["move-node-to-workspace 2"]

[[on-window-detected]]
if.app-id = "md.obsidian"
run = ["move-node-to-workspace 3"]

[[on-window-detected]]
if.app-id = "com.apple.Notes"
run = ["move-node-to-workspace 3"]

[[on-window-detected]]
if.app-id = "com.apple.mail"
run = ["move-node-to-workspace 4"]

[[on-window-detected]]
if.app-id = "com.tinyspeck.slackmacgap"
run = ["move-node-to-workspace 4"]
